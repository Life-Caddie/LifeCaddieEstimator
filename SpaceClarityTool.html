<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Life Caddie – Space Clarity Tool</title>
  <style>
    :root { --border:#e5e7eb; --bg:#f7f7f8; --text:#111827; --muted:#6b7280; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:var(--text); background:#fff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
    .grid { display:grid; grid-template-columns: 1fr 1.2fr; gap: 16px; align-items:start; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .card { border:1px solid var(--border); border-radius:14px; background:#fff; overflow:hidden; }
    .card h2 { margin:0; font-size: 16px; padding: 14px 14px 10px; border-bottom:1px solid var(--border); }
    .card .body { padding:14px; }

    label { display:block; font-size: 13px; margin: 10px 0 6px; color: var(--muted); }
    select, input[type="file"], button, textarea {
      width:100%;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:10px;
      font-size:14px;
      background:#fff;
    }
    .row { display:grid; grid-template-columns: 1fr; gap: 10px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height:1.35; }
    .btn {
      margin-top: 12px;
      border: none;
      background: #111827;
      color:#fff;
      cursor:pointer;
      font-weight: 600;
      padding: 11px 12px;
    }
    .btn:disabled { opacity:0.55; cursor:not-allowed; }
    .secondary {
      background: #fff;
      color: #111827;
      border: 1px solid var(--border);
      font-weight: 600;
    }

    /* Chat UI */
    .chat { background: var(--bg); }
    .chatlog {
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
      height: 520px;
      overflow:auto;
    }
    @media (max-width: 900px) { .chatlog { height: 420px; } }
    .msg { max-width: 92%; padding: 10px 12px; border-radius: 14px; border:1px solid var(--border); background:#fff; white-space: pre-wrap; line-height:1.35; }
    .msg.user { align-self:flex-end; background:#111827; color:#fff; border-color:#111827; }
    .msg.bot { align-self:flex-start; }
    .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .chatbar { border-top:1px solid var(--border); padding: 10px; display:flex; gap: 10px; background:#fff; }
    .chatbar input { flex: 1; }
    .pillrow { display:flex; gap: 8px; flex-wrap:wrap; margin-top: 10px; }
    .pill {
      font-size: 12px; padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff; cursor:pointer;
    }
    .pill:hover { background:#f3f4f6; }

    /* Preview */
    .preview {
      margin-top: 10px;
      border:1px dashed var(--border);
      border-radius: 12px;
      padding: 10px;
      background:#fafafa;
    }
    .preview img { max-width:100%; border-radius:10px; display:block; }
    .small { font-size: 12px; color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">

      <!-- LEFT: Form -->
      <div class="card">
        <h2>Upload + 2 questions</h2>
        <div class="body">
          <form id="spaceForm">
            <label for="photo">Upload a photo of your space</label>
            <input id="photo" name="photo" type="file" accept="image/*" />

            <div id="preview" class="preview" style="display:none;">
              <img id="previewImg" alt="Selected photo preview" />
              <div class="small" id="previewMeta"></div>
            </div>

            <label for="intention">1) Intention</label>
            <select id="intention" name="intention" required>
              <option value="" selected disabled>Select one…</option>
              <option value="moving">Moving</option>
              <option value="prepping_to_downsize">Prepping to downsize</option>
              <option value="reset">Reset</option>
              <option value="staging">Staging</option>
              <option value="caregiving">Caregiving</option>
              <option value="other">Other</option>
            </select>

            <label for="feeling">2) How the space is making me feel</label>
            <select id="feeling" name="feeling" required>
              <option value="" selected disabled>Select one…</option>
              <option value="overwhelmed">Overwhelmed</option>
              <option value="excited">Excited</option>
              <option value="sad">Sad</option>
              <option value="motivated">Motivated</option>
              <option value="other">Other</option>
            </select>

            <button id="submitBtn" class="btn" type="submit">Get my Clarity Plan</button>
            <button id="resetBtn" class="btn secondary" type="button">Reset</button>

            <div class="hint">
              Tip: Start anonymous. After you get your plan, you can choose to save it or go deeper.
            </div>

            <!-- Optional: set this to your real endpoint (e.g., /api/analyze) -->
            <input type="hidden" id="apiEndpoint" value="/api/analyze" />
          </form>
        </div>
      </div>

      <!-- RIGHT: Chat -->
      <div class="card chat">
        <h2>Your Life Caddie Plan</h2>
        <div id="chatlog" class="chatlog" aria-live="polite"></div>

        <div class="chatbar">
          <input id="chatInput" type="text" placeholder="Optional: add a detail (e.g., “this is my pantry”)…" />
          <button id="sendBtn" class="btn" style="width:auto; padding: 10px 14px;">Send</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // -----------------------------
    // Utilities
    // -----------------------------
    const $ = (sel) => document.querySelector(sel);

    function addMessage(text, who = "bot") {
      const chatlog = $("#chatlog");
      const bubble = document.createElement("div");
      bubble.className = `msg ${who}`;
      bubble.textContent = text;
      chatlog.appendChild(bubble);
      chatlog.scrollTop = chatlog.scrollHeight;
      return bubble;
    }

    function setBusy(isBusy) {
      $("#submitBtn").disabled = isBusy;
      $("#sendBtn").disabled = isBusy;
      $("#photo").disabled = isBusy;
      $("#intention").disabled = isBusy;
      $("#feeling").disabled = isBusy;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result); // data:*/*;base64,...
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function prettyOption(value) {
      const map = {
        moving: "Moving",
        prepping_to_downsize: "Prepping to downsize",
        reset: "Reset",
        staging: "Staging",
        caregiving: "Caregiving",
        overwhelmed: "Overwhelmed",
        excited: "Excited",
        sad: "Sad",
        motivated: "Motivated",
        other: "Other"
      };
      return map[value] || value;
    }

    // -----------------------------
    // Initial chat welcome
    // -----------------------------
    addMessage("Hi — I’m your Life Caddie.\n\nUpload a photo and answer the two questions on the left. I’ll give you a gentle first-step plan that matches your intention and how you’re feeling.");

    // -----------------------------
    // Image preview
    // -----------------------------
    $("#photo").addEventListener("change", async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) {
        $("#preview").style.display = "none";
        return;
      }
      const url = URL.createObjectURL(file);
      $("#previewImg").src = url;
      $("#preview").style.display = "block";
      $("#previewMeta").textContent = `${file.name} • ${(file.size / 1024 / 1024).toFixed(2)} MB`;
    });

    // -----------------------------
    // Submit flow (Upload + 2 questions)
    // -----------------------------
    $("#spaceForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = $("#photo").files && $("#photo").files[0];
      const intention = $("#intention").value;
      const feeling = $("#feeling").value;

      if (!file) {
        addMessage("Please upload a photo first (any angle is fine).", "bot");
        return;
      }

      // Echo user choices in chat (lead-gen friendly: confirms they’re understood)
      addMessage(`Photo uploaded.\nIntention: ${prettyOption(intention)}\nFeeling: ${prettyOption(feeling)}`, "user");

      setBusy(true);
      const thinking = addMessage("Analyzing your space…", "bot");

      try {
        // Convert to base64 for easy transport to your API.
        // In production, you may want direct-to-storage uploads + signed URLs instead.
        const imageDataUrl = await fileToBase64(file);

        const payload = {
          intention,
          feeling,
          image: imageDataUrl,
          // You can add a place for your "prompting context" or any internal flags:
          context_version: "v1"
        };

        const endpoint = $("#apiEndpoint").value;

        // ---- Call your backend ----
        // Expecting JSON response like:
        // { messages: ["...", "..."], quick_actions: ["..."], followups: ["..."] }
        let result;

        try {
          const resp = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!resp.ok) throw new Error(`API returned ${resp.status}`);

          result = await resp.json();
        } catch (apiErr) {
          // Fallback demo response so you can test the front-end immediately
          result = demoResponse(intention, feeling);
        }

        // Replace thinking bubble
        thinking.remove();

        // Render bot messages
        (result.messages || []).forEach(m => addMessage(m, "bot"));

        // Render optional quick action pills (nice for lead-gen engagement)
        if (Array.isArray(result.quick_actions) && result.quick_actions.length) {
          const chatlog = $("#chatlog");
          const wrap = document.createElement("div");
          wrap.className = "pillrow";
          result.quick_actions.forEach((label) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "pill";
            btn.textContent = label;
            btn.addEventListener("click", () => {
              addMessage(label, "user");
              addMessage("Got it. If you want, add one detail in the box below (like your timeline), and I’ll tailor the next step.", "bot");
            });
            wrap.appendChild(btn);
          });
          chatlog.appendChild(wrap);
          chatlog.scrollTop = chatlog.scrollHeight;
        }

      } catch (err) {
        thinking.textContent = "Something went wrong. Please try again.";
        console.error(err);
      } finally {
        setBusy(false);
      }
    });

    // -----------------------------
    // Optional chat input (lightweight follow-up)
    // -----------------------------
    $("#sendBtn").addEventListener("click", () => {
      const input = $("#chatInput");
      const text = (input.value || "").trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      // For MVP: respond with a gentle nudge.
      // Later: send this as a follow-up to your backend to refine the plan.
      addMessage("Thanks — that helps. If you’d like, hit “Get my Clarity Plan” again after uploading a clearer angle, or keep going and I’ll adjust the next steps based on what you shared.", "bot");
    });

    $("#chatInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        $("#sendBtn").click();
      }
    });

    // -----------------------------
    // Reset
    // -----------------------------
    $("#resetBtn").addEventListener("click", () => {
      $("#spaceForm").reset();
      $("#preview").style.display = "none";
      $("#chatlog").innerHTML = "";
      addMessage("Hi — I’m your Life Caddie.\n\nUpload a photo and answer the two questions on the left. I’ll give you a first-step plan that matches your intention and how you’re feeling.");
      $("#chatInput").value = "";
    });

    // -----------------------------
    // Demo response (front-end testing without a backend)
    // -----------------------------
    function demoResponse(intention, feeling) {
      const i = prettyOption(intention);
      const f = prettyOption(feeling);

      return {
        messages: [
          `Thanks — I’ve got you.\n\nBased on your intention (${i}) and how you’re feeling (${f}), here’s a gentle Clarity Plan to reduce decision fatigue and create momentum.`,
          "What I’m noticing (high-level):\n• There are likely a few “hot spots” where items accumulate.\n• The fastest relief usually comes from clearing a single surface or zone—not the whole room.",
          "Your first 10-minute step:\n1) Choose ONE small zone (a counter corner, top drawer, one shelf).\n2) Remove anything that obviously doesn’t belong there.\n3) Put back only the essentials for that zone’s purpose.\n\nStop after 10 minutes. Momentum beats perfection.",
          "If you want, I can generate a deeper plan (zones + sequence). For that, tell me what kind of space this is (kitchen/closet/office/etc.) in the message box below."
        ],
        quick_actions: [
          "This is a kitchen",
          "This is a closet",
          "This is an office",
          "This is a bedroom",
          "I’m helping a parent"
        ]
      };
    }
  </script>
</body>
</html>
